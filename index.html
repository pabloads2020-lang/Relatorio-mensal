<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PBF · Gerador de Relatório Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg: #0e1117; --card: #161b25; --gold: #f5c842; --text: #e8eaf0; --text-dim: #8b93a7;
            --green: #2ecc71; --red: #e74c3c; --border: rgba(255,255,255,0.07);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .output { background: #fff; color: #1a1a1a; padding: 30px; border-radius: 8px; white-space: pre-wrap; font-size: 15px; border: 1px solid #ccc; }
        .debug-area { font-family: monospace; font-size: 11px; color: #555; margin-top: 10px; display: none; }
        h3 { color: var(--gold); margin-top: 0; }
        .negative { color: var(--red); }
        .positive { color: var(--green); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>1. Importar PDF da XP</h3>
        <input type="file" id="filePdf" accept=".pdf">
        <button class="btn" id="btnProcessar">Gerar Texto do Relatório</button>
        <div id="status" style="margin-top:10px; font-size:13px;"></div>
    </div>

    <div class="card">
        <h3>2. Texto do Relatório (Pronto para copiar)</h3>
        <div id="relatorioFinal" class="output">O relatório aparecerá aqui após o processamento...</div>
        <button class="btn" style="margin-top:10px; background:#444; color:#fff;" onclick="copiarTexto()">Copiar Texto</button>
    </div>

    <div id="debugBox" class="debug-area"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// =========================================================
// BASE DE DADOS DE CENÁRIOS (Atualize aqui uma vez por mês)
// =========================================================
const cenariosMensais = {
    "Abril/2026": {
        brasil: "No Brasil, o mês de abril foi marcado pela divulgação do IPCA dentro das expectativas, o que permitiu ao Banco Central manter o ritmo de cortes na Selic. O cenário fiscal seguiu no radar dos investidores, mas a melhora na arrecadação trouxe um alívio temporário para os ativos de risco locais.",
        global: "No cenário global, o foco permaneceu nos dados de inflação dos EUA, que mostram uma resiliência maior do que o esperado, adiando as expectativas de corte de juros pelo Fed. Além disso, a manutenção dos conflitos geopolíticos contribuiu para a volatilidade nos preços das commodities."
    },
    "Março/2026": {
        brasil: "O mês de março foi marcado por uma consolidação das expectativas econômicas. No Brasil, a divulgação do IPCA coincidiu com o primeiro corte da Selic, dando início ao ciclo de flexibilização da política monetária.",
        global: "No cenário global, a volatilidade adicional veio do acirramento dos conflitos no Oriente Médio pressionando os preços do petróleo, somada aos dados de emprego nos EUA."
    }
};

let dados = { alocacoes: {}, retornos: {} };

function limparTexto(t) {
    // Remove espaços entre letras/números comuns no PDF da XP
    return t.replace(/(\d)\s+(?=\d|[\.,%])/g, '$1').replace(/([\.,%])\s+(?=\d)/g, '$1').replace(/\s+/g, ' ');
}

async function processar() {
    const file = document.getElementById('filePdf').files[0];
    if (!file) return alert("Selecione um PDF");

    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    
    dados = { alocacoes: {}, retornos: {}, patrimonio: "", rentMes: "", cdiMes: "", mes: "", ano: "" };

    for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const texto = limparTexto(content.items.map(it => it.str).join(' '));

        // Captura Data
        let mData = texto.match(/Data\s+de\s+Refer[êe]ncia\s+(\d{2})\/(\d{2})\/(\d{4})/i);
        if (mData && !dados.mes) {
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            dados.mes = meses[parseInt(mData[2]) - 1];
            dados.ano = mData[3];
        }

        // Captura Patrimônio (Pág 2 ou 4)
        let mPat = texto.match(/PATRIM[OÔ]NIO\s+TOTAL\s+BRUTO:\s*R\$\s*([\d\.]+,\d{2})/i);
        if (mPat) dados.patrimonio = mPat[1];

        // Captura Rentabilidade e %CDI (Baseado no seu Debug da Pág 4)
        // O padrão é: R$ [valor] [rent%] [cdi%]
        let mResumo = texto.match(/abr\s*\.\/\s*26\s*R\$\s*[\d\.]+,\d{2}.+?R\$\s*[\d\.]+,\d{2}\s*([\d,]+)%\s*([\d,]+)%/i);
        if (mResumo) {
            dados.rentMes = mResumo[1];
            dados.cdiMes = mResumo[2];
        } else {
            // Backup caso o formato mude (Pág 2)
            let mRent2 = texto.match(/RENTABILIDADE\s+M[ÊE]S:\s*([\d,]+)%/i);
            if (mRent2) dados.rentMes = mRent2[1];
        }

        // Captura Estratégias (Pág 5)
        if (i >= 4) {
            const classes = [
                { id: 'Pós-fixada', regex: /P[oó]s\s*Fixado/i },
                { id: 'Inflação', regex: /In\s*f\s*l\s*a\s*[çc]\s*[ãa]o/i },
                { id: 'Pré-fixada', regex: /Pr[ée]\s*Fixado/i },
                { id: 'Renda Variável Brasil', regex: /Renda\s*Vari[áa]vel\s*Brasil/i },
                { id: 'Multimercado', regex: /Multimercado/i },
                { id: 'Alternativo', regex: /Alternativo/i },
                { id: 'Renda Variável Global', regex: /Renda\s*Vari[áa]vel\s*Global/i }
            ];

            classes.forEach(c => {
                let reg = new RegExp(`${c.regex.source}\\s*\\(\\s*([\\d,]+)%\\s*\\)\\s*R\\$\\s*[\\d\\.\\s]+,\\d{2}\\s*([\\d,+-]+)%`, 'i');
                let m = texto.match(reg);
                if (m) {
                    dados.alocacoes[c.id] = m[1];
                    dados.retornos[c.id] = m[2];
                }
            });
        }
    }

    construirRelatorio();
}

function construirRelatorio() {
    const chave = `${dados.mes}/${dados.ano}`;
    const cenario = cenariosMensais[chave] || { 
        brasil: "(Resumo do mercado brasileiro para este mês ainda não cadastrado no script)", 
        global: "(Resumo do mercado global para este mês ainda não cadastrado no script)" 
    };

    let textoClasses = "";
    const ordem = ['Pós-fixada', 'Pré-fixada', 'Inflação', 'Multimercado', 'Alternativo', 'Renda Variável Brasil', 'Renda Variável Global'];
    
    ordem.forEach(cls => {
        if (dados.alocacoes[cls]) {
            let aloc = dados.alocacoes[cls];
            let ret = dados.retornos[cls];
            let acao = parseFloat(ret.replace(',', '.')) >= 0 ? "subiu" : "recuou";
            textoClasses += `• A classe ${cls} (${aloc}% da carteira) ${acao} ${ret}%;\n`;
        }
    });

    const relatorio = `Prezado Cliente, tudo bem? Segue o seu relatório mensal.

O mês de ${dados.mes.toLowerCase()} foi marcado por:
${cenario.brasil}
${cenario.global}

Sua carteira atravessou esse ambiente com solidez. No mês de ${dados.mes.toLowerCase()}, o portfólio apresentou um retorno de ${dados.rentMes}%. Esse resultado representou ${dados.cdiMes}% do CDI do período. O patrimônio total bruto encerrou em R$ ${dados.patrimonio}.

No desempenho por estratégias:
${textoClasses}
Por fim, reforçamos a importância da disciplina na manutenção da estratégia focando no desenvolvimento da carteira no longo prazo. Essa postura é fundamental para atravessar diferentes ciclos de mercado e manter a carteira alinhada aos seus objetivos financeiros.

Atenciosamente,
Equipe PBF Investimentos`;

    document.getElementById('relatorioFinal').innerText = relatorio;
}

function copiarTexto() {
    const txt = document.getElementById('relatorioFinal').innerText;
    navigator.clipboard.writeText(txt);
    alert("Texto copiado para a área de transferência!");
}

document.getElementById('btnProcessar').addEventListener('click', processar);
</script>

</body>
</html>
