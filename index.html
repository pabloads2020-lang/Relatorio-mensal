<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBF · Relatório Mensal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
            --gold: #f5c842; --gold2: #e0a800;
            --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
            --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
            --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .main { max-width: 900px; margin: 0 auto; padding: 2rem; }
        
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        textarea { width: 100%; background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; font-family: inherit; font-size: 14px; margin-top: 10px; resize: vertical; }
        
        .upload-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-top: 15px; }
        .file-label { background: var(--bg3); border: 1.5px dashed var(--border2); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; flex: 1; text-align: center; }
        #filePdf { display: none; }
        
        .btn { padding: 12px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; width: 100%; }
        .btn-gold { background: var(--gold); color: #000; margin-top: 10px; }
        .btn-gold:hover { background: var(--gold2); }
        .btn-dark { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); margin-top: 10px; }
        
        .output-container { background: #ffffff; color: #1a1a1a; border-radius: 12px; padding: 2rem; font-size: 15px; white-space: pre-wrap; min-height: 200px; border: 1px solid #ddd; }
        .status { margin-top: 10px; font-size: 13px; color: var(--gold); text-align: center; }
    </style>
</head>
<body>

<header class="header">
    <div style="font-weight: 700; color: var(--gold); letter-spacing: 1px;">PBF INVESTIMENTOS</div>
    <div style="font-size: 12px; color: var(--text3);">Gerador de Relatórios v2.0</div>
</header>

<main class="main">
    <div class="card">
        <div class="card-title">🌐 Cenário Macro do Mês</div>
        <p style="font-size: 13px; color: var(--text2);">Cole o resumo de mercado para compor a introdução do texto:</p>
        <textarea id="textoCenario" rows="4">O mês de abril foi marcado por uma consolidação das expectativas econômicas. No Brasil, o cenário fiscal seguiu no radar, enquanto no global a resiliência da inflação americana adiou as expectativas de corte de juros.</textarea>
    </div>

    <div class="card">
        <div class="card-title">📄 Importar Relatório XP</div>
        <div class="upload-row">
            <label class="file-label" for="filePdf">
                <span id="fileName">Selecionar arquivo PDF...</span>
            </label>
            <input type="file" id="filePdf" accept=".pdf">
        </div>
        <button class="btn btn-gold" id="btnProcessar">GERAR RELATÓRIO COMPLETO</button>
        <div id="status" class="status"></div>
    </div>

    <div class="card">
        <div class="card-title">📈 Texto Final (Pronto para WhatsApp)</div>
        <div id="relatorioFinal" class="output-container">O texto aparecerá aqui após o processamento...</div>
        <button class="btn btn-dark" onclick="copiar()">Copiar Texto</button>
    </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function limparTexto(t) {
    return t.replace(/(\d)\s+(?=\d|[\.,%])/g, '$1').replace(/([\.,%])\s+(?=\d)/g, '$1').replace(/\s+/g, ' ');
}

async function processar() {
    const file = document.getElementById('filePdf').files[0];
    if (!file) return alert("Por favor, selecione um PDF.");
    
    document.getElementById('status').innerText = "Processando PDF...";

    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let d = { alocacoes: {}, retornos: {}, patrimonio: "", rentMes: "", cdiMes: "", mes: "" };

    for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const texto = limparTexto(content.items.map(it => it.str).join(' '));

        let mData = texto.match(/Data\s+de\s+Refer[êe]ncia\s*[:\s]*(\d{2})\/(\d{2})/i);
        if (mData && !d.mes) {
            const meses = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
            d.mes = meses[parseInt(mData[2]) - 1];
        }

        let mPat = texto.match(/PATRIM[OÔ]NIO\s+TOTAL\s+BRUTO\s*[:\s]*R\$\s*([\d\.]+,\d{2})/i);
        if (mPat) d.patrimonio = mPat[1];

        let mResumo = texto.match(/R\$\s*[\d\.]+,\d{2}\s*([\d,+-]+)%\s*([\d,]+)%/i);
        if (mResumo && !d.rentMes) { 
            d.rentMes = mResumo[1]; 
            d.cdiMes = mResumo[2]; 
        }

        const classes = [
            { id: 'Pós-fixada', regex: /P[oó]s\s*Fixado/i },
            { id: 'Inflação', regex: /In\s*f\s*l\s*a\s*[çc]\s*[ãa]o/i },
            { id: 'Pré-fixada', regex: /Pr[ée]\s*Fixado/i },
            { id: 'Renda Variável Brasil', regex: /Renda\s*Vari[áa]vel\s*Brasil/i },
            { id: 'Renda Variável Global', regex: /Renda\s*Vari[áa]vel\s*Global/i },
            { id: 'Multimercado', regex: /Multimercado/i },
            { id: 'Alternativo', regex: /Alternativo/i }
        ];

        classes.forEach(c => {
            let reg = new RegExp(`${c.regex.source}\\s*\\(\\s*([\\d,]+)%\\s*\\)\\s*R\\$\\s*[\\d\\.\\s]+,\\d{2}([\\d,+-]+)%`, 'i');
            let m = texto.match(reg);
            if (m) { d.alocacoes[c.id] = m[1]; d.retornos[c.id] = m[2]; }
        });
    }

    document.getElementById('status').innerText = "✅ Relatório gerado com sucesso!";
    montar(d);
}

function montar(d) {
    let cenario = document.getElementById('textoCenario').value;
    let resumoAtivos = "";
    const ordem = ['Pós-fixada', 'Pré-fixada', 'Inflação', 'Multimercado', 'Alternativo', 'Renda Variável Brasil', 'Renda Variável Global'];
    
    ordem.forEach(c => {
        if (d.alocacoes[c]) {
            let valRet = parseFloat(d.retornos[c].replace(',','.'));
            let acao = valRet >= 0 ? "subiu" : "recuou";
            resumoAtivos += `• A estratégia ${c} (${d.alocacoes[c]}% da carteira) ${acao} ${d.retornos[c]}% no mês;\n`;
        }
    });

    const final = `Prezado Cliente, tudo bem? Segue o seu relatório mensal.

${cenario}

Sua carteira atravessou esse ambiente com solidez. No mês de ${d.mes}, o portfólio apresentou um retorno de ${d.rentMes}%, o que representou ${d.cdiMes}% do CDI do período. O patrimônio total bruto encerrou em R$ ${d.patrimonio}.

No desempenho por estratégias:
${resumoAtivos}
Por fim, reforçamos a importância da disciplina na manutenção da estratégia focando no desenvolvimento da carteira no longo prazo.

Atenciosamente,
Equipe PBF Investimentos`;

    document.getElementById('relatorioFinal').innerText = final;
}

function copiar() {
    const el = document.getElementById('relatorioFinal');
    navigator.clipboard.writeText(el.innerText);
    alert("Copiado para a área de transferência!");
}

document.getElementById('filePdf').addEventListener('change', function() {
    document.getElementById('fileName').textContent = this.files[0]?.name || 'Selecionar arquivo PDF...';
});

document.getElementById('btnProcessar').addEventListener('click', processar);
</script>

</body>
</html>
