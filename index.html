<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBF · Relatório Mensal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
    /* Mantendo seu estilo original para o visual continuar igual */
    :root {
        --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
        --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
        --gold: #f5c842; --gold2: #e0a800;
        --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
        --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
        --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
    }
    body.light {
        --bg: #f5f7fa; --bg2: #ffffff; --bg3: #f0f2f5;
        --border: rgba(0,0,0,0.08); --gold: #d4a017;
        --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .main { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
    .upload-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .file-label { background: var(--bg3); border: 1.5px dashed var(--border2); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; flex: 1; }
    #filePdf { display: none; }
    .btn { padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
    .btn-gold { background: var(--gold); color: #000; }
    .status { display: none; padding: 9px; border-radius: 8px; font-size: 14px; margin-top: 10px; }
    .status.show { display: block; }
    .status-ok { background: var(--green-bg); color: var(--green); }
    .debug-box { display: none; background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 10px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    .debug-box.show { display: block; }
    .relatorio-container { background: rgba(255,255,255,0.02); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--border); }
    .relatorio-dados { background: var(--bg3); padding: 1rem; border-radius: 8px; border-left: 4px solid var(--gold); margin: 15px 0; }
    .relatorio-positivo { color: var(--green); font-weight: bold; }
    .relatorio-negativo { color: var(--red); font-weight: bold; }
</style>
</head>
<body>

<header class="header">
    <div style="font-weight: bold;">PBF Relatório</div>
    <div id="hDate"></div>
</header>

<main class="main">
    <div class="card">
        <div class="card-title">📄 Importar relatório XP</div>
        <div class="upload-row">
            <label class="file-label" for="filePdf">📎 <span id="fileName">Selecionar PDF...</span></label>
            <input type="file" id="filePdf" accept=".pdf">
            <button class="btn btn-gold" id="btnImportar">Gerar Relatório</button>
        </div>
        <div id="status" class="status"></div>
        <button style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:10px; margin-top:10px;" onclick="document.getElementById('debugBox').classList.toggle('show')">Exibir Debug</button>
        <div id="debugBox" class="debug-box"></div>
    </div>

    <div class="card">
        <div class="card-title">📈 Resultado</div>
        <div id="relatorioConteudo" class="relatorio-container">Aguardando PDF...</div>
    </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let dadosCarteira = {};

function dbg(txt) { 
    const box = document.getElementById('debugBox');
    box.textContent += txt + '\n';
}

function limparDados() {
    dadosCarteira = { alocacoes: {}, retornos: {}, patrimonio: 0, rentabilidadeMensal: null, pctCdi: null, mes: "", ano: "" };
    document.getElementById('debugBox').textContent = "";
}

// Função poderosa para limpar espaços entre letras e números
function limparEspacos(texto) {
    // Remove espaços entre números, vírgulas e pontos (ex: 2 8 . 9 7 8 , 3 7 -> 28.978,37)
    let t = texto.replace(/(\d)\s+(?=\d|[\.,%])/g, '$1');
    t = t.replace(/([\.,%])\s+(?=\d)/g, '$1');
    // Remove espaços duplos
    return t.replace(/\s+/g, ' ');
}

async function extrairDadosPDF(file) {
    limparDados();
    let ab = await file.arrayBuffer();
    let pdf = await pdfjsLib.getDocument({ data: ab }).promise;

    for (let p = 1; p <= Math.min(pdf.numPages, 5); p++) {
        let page = await pdf.getPage(p);
        let content = await page.getTextContent();
        let textoOriginal = content.items.map(i => i.str).join(' ');
        let texto = limparEspacos(textoOriginal);
        
        dbg(`--- PÁGINA ${p} (Processada) ---`);
        dbg(texto.substring(0, 500));

        // 1. DATA (Pág 1 ou 2)
        let dataMatch = texto.match(/Data\s+de\s+Refer[êe]ncia\s+(\d{2})\/(\d{2})\/(\d{4})/i);
        if (dataMatch && !dadosCarteira.mes) {
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            dadosCarteira.mes = meses[parseInt(dataMatch[2]) - 1];
            dadosCarteira.ano = dataMatch[3];
        }

        // 2. PATRIMÔNIO (Pág 2)
        let patMatch = texto.match(/PATRIM[OÔ]NIO\s+TOTAL\s+BRUTO:\s*R\$\s*([\d\.]+,\d{2})/i);
        if (patMatch) {
            dadosCarteira.patrimonio = patMatch[1];
            dbg(`Achou Patr: ${patMatch[1]}`);
        }

        // 3. RENTABILIDADE E %CDI (Pág 2 - Tabela de Resumo)
        // Busca na linha do "MÊS" os valores financeiros e percentuais
        let resumoMatch = texto.match(/M[ÊE]S\s*R\$\s*[\d\.]+,\d{2}\s*([\d,]+)\s*%\s*([\d,]+)\s*%/i);
        if (resumoMatch) {
            dadosCarteira.rentabilidadeMensal = resumoMatch[1];
            dadosCarteira.pctCdi = resumoMatch[2];
            dbg(`Achou Rent: ${resumoMatch[1]}% e CDI: ${resumoMatch[2]}%`);
        }

        // 4. ESTRATÉGIAS (Pág 5)
        if (p >= 4) {
            const itens = [
                { id: 'Pós Fixado', regex: /P[oó]s\s*Fixado/i },
                { id: 'Inflação', regex: /In\s*f\s*l\s*a\s*[çc]\s*[ãa]o/i },
                { id: 'Pré Fixado', regex: /Pr[ée]\s*Fixado/i },
                { id: 'Renda Variável Brasil', regex: /Renda\s*Vari[áa]vel\s*Brasil/i },
                { id: 'Renda Variável Global', regex: /Renda\s*Vari[áa]vel\s*Global/i },
                { id: 'Multimercado', regex: /Multimercado/i },
                { id: 'Alternativo', regex: /Alternativo/i }
            ];

            itens.forEach(item => {
                // Regex para capturar: Nome ( Aloc% ) R$ Valor Rent%
                let regEstrat = new RegExp(`${item.regex.source}\\s*\\(\\s*([\\d,]+)\\s*%\\s*\\)\\s*R\\$\\s*[\\d\\.\\s]+,\\d{2}\\s*([\\d,+-]+)\\s*%`, 'i');
                let m = texto.match(regEstrat);
                if (m) {
                    dadosCarteira.alocacoes[item.id] = m[1];
                    dadosCarteira.retornos[item.id] = m[2];
                    dbg(`Estratégia: ${item.id} -> ${m[1]}% aloc / ${m[2]}% retorno`);
                }
            });
        }
    }
    gerarHTML();
}

function gerarHTML() {
    if (!dadosCarteira.patrimonio) {
        document.getElementById('relatorioConteudo').innerHTML = "Erro ao ler dados. Verifique o log de debug.";
        return;
    }

    let estrs = "";
    for (let nome in dadosCarteira.alocacoes) {
        let ret = dadosCarteira.retornos[nome] || "0,00";
        let cor = ret.includes('-') ? 'relatorio-negativo' : 'relatorio-positivo';
        estrs += `• <strong>${nome}</strong> (${dadosCarteira.alocacoes[nome]}% da carteira): <span class="${cor}">${ret}% no mês</span><br>`;
    }

    let html = `
        <div style="color:var(--gold); font-weight:bold; margin-bottom:15px;">📋 Prezado cliente, segue o resumo do seu portfólio.</div>
        <p style="font-size:14px; margin-bottom:10px;">O mês de <strong>${dadosCarteira.mes} de ${dadosCarteira.ano}</strong> apresentou os seguintes resultados:</p>
        
        <div class="relatorio-dados">
            <p>💰 <strong>Patrimônio Total:</strong> R$ ${dadosCarteira.patrimonio}</p>
            <p>📈 <strong>Rentabilidade:</strong> ${dadosCarteira.rentabilidadeMensal}% (${dadosCarteira.pctCdi}% do CDI)</p>
        </div>

        <p style="font-size:14px; margin-top:15px;"><strong>Desempenho por classe:</strong></p>
        <div style="font-size:13px; line-height:1.6; margin-top:5px;">${estrs}</div>
        
        <div style="margin-top:20px; font-size:12px; border-top:1px solid var(--border); padding-top:10px; color:var(--text3);">
            Atenciosamente,<br><strong>Equipe PBF Investimentos</strong>
        </div>
    `;
    document.getElementById('relatorioConteudo').innerHTML = html;
}

// Eventos
document.getElementById('btnImportar').addEventListener('click', async () => {
    let file = document.getElementById('filePdf').files[0];
    if (!file) return alert("Selecione um PDF");
    document.getElementById('status').innerHTML = "Processando...";
    document.getElementById('status').className = "status show";
    
    try {
        await extrairDadosPDF(file);
        document.getElementById('status').innerHTML = "✅ Relatório Gerado!";
        document.getElementById('status').className = "status show status-ok";
    } catch (e) {
        document.getElementById('status').innerHTML = "❌ Erro: " + e.message;
        dbg("ERRO: " + e.stack);
    }
});

document.getElementById('filePdf').addEventListener('change', function() {
    document.getElementById('fileName').textContent = this.files[0]?.name || 'Selecionar PDF...';
});
</script>

</body>
</html>
