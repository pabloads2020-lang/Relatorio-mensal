<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PERFIS = {
  Conservador: { "Renda Fixa Pós": 85, "Renda Fixa Pré": 15, "Renda Fixa Inflação": 0, "Multiestratégia": 0, "Renda Variável": 0, "Renda Fixa Global": 0, "Renda Variável Global": 0, "Alternativo": 0 },
  Moderado: { "Renda Fixa Pós": 54, "Renda Fixa Pré": 13, "Renda Fixa Inflação": 20, "Multiestratégia": 5, "Renda Variável": 4, "Renda Fixa Global": 0, "Renda Variável Global": 4, "Alternativo": 0 },
  Agressivo: { "Renda Fixa Pós": 44, "Renda Fixa Pré": 15, "Renda Fixa Inflação": 24, "Multiestratégia": 5, "Renda Variável": 6, "Renda Fixa Global": 0, "Renda Variável Global": 6, "Alternativo": 0 }
};

const CLASSES = ["Renda Fixa Pós", "Renda Fixa Pré", "Renda Fixa Inflação", "Multiestratégia", "Renda Variável", "Renda Fixa Global", "Renda Variável Global", "Alternativo", "Caixa", "Proventos", "Fundos Listados"];
const CORES = ["c0","c1","c2","c3","c4","c5","c6","c7","c8","c9","c10"];

let perfilAtivo = "Moderado";
let inputsMap = {};
let patrimonioTotal = 0;
let debugContent = [];

let dadosCarteira = {
  alocacoes: {},
  retornos: {},
  rentabilidadeMensal: null,
  pctCdi: null,
  dataReferencia: "",
  patrimonio: 0,
  mesReferencia: "",
  anoReferencia: ""
};

function fmtPct(v) { return v.toFixed(2).replace('.', ',') + ' %'; }
function fmtPctSimples(v) { if (v === undefined || v === null) return '0,00'; return v.toFixed(2).replace('.', ','); }
function fmtPctRelatorio(v) { if (v === undefined || v === null) return '0,00%'; return v.toFixed(2).replace('.', ',') + '%'; }
function fmtBRL(v) { return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits: 2}); }
function setStatus(msg, tipo) { const el = document.getElementById('status'); el.innerHTML = msg; el.className = 'status show status-' + tipo; setTimeout(() => el.classList.remove('show'), 4000); }
function dbg(txt) { debugContent.push(txt); document.getElementById('debugBox').textContent = debugContent.join('\n'); }
function clearDebug() { debugContent = []; document.getElementById('debugBox').textContent = ''; }

function atualizarTotal() {
  let t = 0;
  CLASSES.forEach(c => { t += parseFloat(inputsMap[c]?.value || 0) || 0; });
  document.getElementById('totalVal').textContent = fmtPct(t);
  document.getElementById('totalBar').className = 'total-bar ' + (Math.abs(t - 100) < 1 ? 'total-ok' : 'total-err');
}

// Função para gerar texto de cenário baseado no mês
function gerarCenarioMercado(mes, ano) {
  const cenarios = {
    "Janeiro": "O mês de janeiro foi marcado pelo início do ano com ajustes de posições nos mercados globais. No Brasil, o foco esteve na definição do Orçamento e nas primeiras sinalizações do BACEN para a política monetária de " + ano + ". No exterior, os dados de emprego nos EUA e as tensões geopolíticas mantiveram a volatilidade elevada.",
    "Fevereiro": "O mês de fevereiro foi marcado por forte volatilidade nos mercados globais. No Brasil, a curva de juros precificou as expectativas para a Selic, enquanto o cenário fiscal continuou no radar dos investidores. No exterior, os dados de inflação nos EUA e os conflitos geopolíticos mantiveram os mercados atentos.",
    "Março": "O mês de março foi marcado por uma consolidação das expectativas econômicas para o restante de " + ano + ". No Brasil, a divulgação do IPCA coincidiu com o primeiro corte da Selic (de 15% para 14,75%), dando início ao ciclo de flexibilização da política monetária e mantendo a atratividade da Renda Fixa. No cenário global, a volatilidade adicional veio do acirramento dos conflitos no Oriente Médio — com a escalada da guerra no Irã pressionando os preços do petróleo —, somada aos dados de inflação e emprego nos EUA, à recuperação gradual na Europa e às sinalizações mistas da China, mantendo os investidores atentos ao ritmo de crescimento das principais economias.",
    "Abril": "O mês de abril foi marcado pela temporada de balanços corporativos nos EUA e na Europa. No Brasil, a agenda fiscal permaneceu no centro das atenções, enquanto o BACEN deu continuidade ao ciclo de flexibilização monetária. Os preços das commodities, especialmente minério de ferro e petróleo, impactaram os ativos domésticos.",
    "Maio": "O mês de maio foi marcado por tensões comerciais entre EUA e China, afetando o apetite por risco global. No Brasil, a discussão sobre a reforma tributária avançou no Congresso, enquanto o mercado acompanhou de perto os dados de atividade econômica. O cenário externo de juros elevados manteve a cautela entre investidores.",
    "Junho": "O mês de junho foi marcado por decisões de política monetária ao redor do mundo. No Brasil, o Copom sinalizou continuidade do ciclo de cortes da Selic, sujeito à evolução fiscal. Nos EUA, o Fed manteve os juros inalterados, enquanto na Europa o BCE iniciou debates sobre flexibilização monetária.",
    "Julho": "O mês de julho foi marcado pela temporada de divulgação do PIB ao redor do mundo. No Brasil, os números mostraram resiliência da atividade econômica, enquanto a arrecadação recorde trouxe alívio fiscal. No exterior, a desaceleração da economia chinesa e a manutenção dos juros americanos moldaram o cenário.",
    "Agosto": "O mês de agosto foi marcado pela 'saída de verão' nos mercados do norte global, reduzindo liquidez e amplificando movimentos atípicos. No Brasil, as discussões sobre o arcabouço fiscal ganharam destaque, enquanto a inflação ao produtor trouxe sinais positivos. Os conflitos no leste europeu mantiveram o preço das commodities energéticas elevado.",
    "Setembro": "O mês de setembro foi marcado por forte volatilidade pré-eleições nos EUA. No Brasil, a Reforma Tributária avançou no Senado, enquanto o mercado de trabalho seguiu aquecido. A decisão do Fed sobre juros e os dados de inflação americana pautaram o humor global dos investidores.",
    "Outubro": "O mês de outubro foi marcado pelo início da temporada de balanços do 3T. No Brasil, a pauta fiscal e o desempenho do setor de serviços foram destaque. No exterior, as eleições nos EUA e os conflitos no Oriente Médio geraram cautela, com investidores migrando para ativos de menor risco.",
    "Novembro": "O mês de novembro foi marcado pela definição das eleições nos EUA e suas consequências para o comércio global. No Brasil, o Black Friday trouxe bons números ao varejo, enquanto a produção industrial surpreendeu positivamente. O cenário de juros globais em patamares elevados remanesceu.",
    "Dezembro": "O mês de dezembro foi marcado pelo tradicional 'rali de fim de ano' nos mercados acionários globais. No Brasil, a aprovação do Orçamento e os dados fiscais de " + ano + " foram acompanhados de perto. O Copom encerrou o ano com mais um corte na Selic, enquanto investidores projetaram " + (parseInt(ano)+1) + " com otimismo moderado."
  };
  return cenarios[mes] || `O mês de ${mes} foi marcado por um ambiente desafiador nos mercados financeiros globais. No Brasil, os agentes acompanharam de perto as discussões fiscais e as decisões do Banco Central. No exterior, as tensões geopolíticas e as perspectivas para os juros americanos seguiram no centro das atenções, criando um cenário de cautela entre os investidores.`;
}

function gerarRelatorioHTML() {
  let data = dadosCarteira.dataReferencia || "mês de referência";
  let mes = dadosCarteira.mesReferencia || "Março";
  let ano = dadosCarteira.anoReferencia || "2026";
  let rentabilidade = dadosCarteira.rentabilidadeMensal;
  let pctCdi = dadosCarteira.pctCdi;
  let patrimonio = dadosCarteira.patrimonio;
  let alocacoes = dadosCarteira.alocacoes;
  let retornos = dadosCarteira.retornos;
  
  // Gerar texto do CDI
  let textoPctCdi = "";
  let cdiDoMes = 1.21; // CDI do mês (do debug: 1,21%)
  if (rentabilidade !== null && pctCdi !== null) {
    textoPctCdi = ` (${Math.abs(pctCdi).toFixed(2).replace('.',',')}% do CDI do período, que foi de ${cdiDoMes}%)`;
  }
  
  // Construir lista de classes
  let classesList = [];
  for (let nome in alocacoes) {
    if (alocacoes[nome] > 0) {
      classesList.push({
        nome: nome,
        alocacao: alocacoes[nome],
        retorno: retornos[nome] !== undefined ? retornos[nome] : null
      });
    }
  }
  classesList.sort((a,b) => b.alocacao - a.alocacao);
  
  // Separar classes com retorno positivo e negativo
  let positivos = [];
  let negativos = [];
  for (let item of classesList) {
    if (item.retorno !== null && item.retorno > 0) positivos.push(item);
    if (item.retorno !== null && item.retorno < 0) negativos.push(item);
  }
  
  // Gerar texto de desempenho por classe
  let desempenhoTexto = "";
  for (let item of classesList) {
    if (item.retorno !== null) {
      let sinal = item.retorno >= 0 ? "positivo" : "negativo";
      let variacao = item.retorno >= 0 ? "valorização" : "queda";
      desempenhoTexto += `<span class="relatorio-classe-item">• <strong>${item.nome}</strong> (${fmtPctSimples(item.alocacao)}% da carteira): ${variacao} de <span class="${item.retorno >= 0 ? 'relatorio-positivo' : 'relatorio-negativo'}">${fmtPctRelatorio(Math.abs(item.retorno))}</span></span>`;
    }
  }
  
  // Gerar texto de Cenário baseado no mês
  let cenarioTexto = gerarCenarioMercado(mes, ano);
  
  // Gerar texto da análise mensal
  let analiseTexto = "";
  if (positivos.length > 0) {
    let principalPositivo = positivos[0];
    analiseTexto += `No mês, a estratégia ${principalPositivo.nome}, que representa ${fmtPctSimples(principalPositivo.alocacao)}% da sua carteira, foi o principal destaque ${principalPositivo.retorno > 0 ? 'positivo' : ''} com rentabilidade de ${fmtPctRelatorio(principalPositivo.retorno)}. `;
  }
  
  let outrosPositivos = positivos.slice(1);
  if (outrosPositivos.length > 0) {
    let nomesPos = outrosPositivos.map(p => `${p.nome} (${fmtPctSimples(p.alocacao)}% da carteira)`).join(', ');
    analiseTexto += `A(s) classe(s) ${nomesPos} também contribuíram positivamente. `;
  }
  
  if (negativos.length > 0) {
    let principaisNegativos = negativos.slice(0, 2);
    analiseTexto += `Por outro lado, a(s) classe(s) ${principaisNegativos.map(n => n.nome).join(' e ')} sentiu(ram) a volatilidade do período, registrando queda de ${fmtPctRelatorio(Math.abs(principaisNegativos[0]?.retorno || 0))}`;
    if (principaisNegativos[1]) {
      analiseTexto += ` e ${fmtPctRelatorio(Math.abs(principaisNegativos[1].retorno))}, respectivamente. `;
    } else {
      analiseTexto += `. `;
    }
  }
  
  let rentabilidadeFormatada = rentabilidade !== null ? fmtPctRelatorio(rentabilidade) : "não disponível";
  let sinalClasse = (rentabilidade !== null && rentabilidade >= 0) ? 'relatorio-positivo' : 'relatorio-negativo';
  let sinalTexto = (rentabilidade !== null && rentabilidade >= 0) ? 'de' : 'de';
  
  let html = `
    <div class="relatorio-saudacao">
      📋 Prezado cliente, tudo bem? Segue o seu relatório mensal.
    </div>
    
    <div class="relatorio-paragrafo">
      ${cenarioTexto}
    </div>
    
    <div class="relatorio-dados">
      <p>📊 <strong>Desempenho da sua carteira:</strong></p>
      <p>Sua carteira atravessou esse ambiente com solidez, apresentando um retorno <strong class="${sinalClasse}">${sinalTexto} ${rentabilidadeFormatada}</strong> no mês de ${data}${textoPctCdi}.</p>
      ${dadosCarteira.rentabilidadeMensal !== null && dadosCarteira.pctCdi !== null ? `<p>No acumulado do ano, o portfólio segue acompanhando as tendências de mercado com disciplina e foco no longo prazo.</p>` : ''}
    </div>
  `;
  
  if (patrimonio > 0) {
    html += `<div class="relatorio-paragrafo">💰 <strong>Patrimônio atual:</strong> ${fmtBRL(patrimonio)}</div>`;
  }
  
  if (classesList.length > 0) {
    html += `<div class="relatorio-paragrafo"><strong>📈 Desempenho por estratégia:</strong><br>${analiseTexto}</div>`;
    html += `<div class="relatorio-dados" style="margin-top:0.5rem"><strong>🔍 Detalhamento mensal:</strong><br>${desempenhoTexto}</div>`;
  }
  
  html += `
    <div class="relatorio-paragrafo">
      Por fim, reforçamos a importância da disciplina na manutenção da estratégia e nos aportes focando no desenvolvimento da carteira no longo prazo. 
      Essa postura é fundamental para atravessar diferentes ciclos de mercado, aproveitar oportunidades, reduzir os impactos das oscilações no curto prazo 
      e manter a carteira alinhada aos seus objetivos financeiros.
    </div>
    
    <div class="relatorio-assinatura">
      Atenciosamente,<br>
      Equipe PBF Investimentos
    </div>
  `;
  
  return html;
}

async function extrairDadosPDF(file) {
  let ab = await file.arrayBuffer();
  let pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let textoCompleto = '';
  
  for (let p = 1; p <= pdf.numPages; p++) {
    let page = await pdf.getPage(p);
    let tc = await page.getTextContent();
    textoCompleto += tc.items.map(item => item.str).join(' ') + ' ';
  }
  
  dbg('=== TRECHO DO PDF ===');
  dbg(textoCompleto.substring(0, 2500));
  
  // Reset dados
  dadosCarteira = {
    alocacoes: {},
    retornos: {},
    rentabilidadeMensal: null,
    pctCdi: null,
    dataReferencia: "",
    patrimonio: 0,
    mesReferencia: "",
    anoReferencia: ""
  };
  
  // 1. Data de Referência
  let dataMatch = textoCompleto.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (dataMatch) {
    let meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    let mesNum = parseInt(dataMatch[2]);
    dadosCarteira.mesReferencia = meses[mesNum - 1];
    dadosCarteira.anoReferencia = dataMatch[3];
    dadosCarteira.dataReferencia = `${dadosCarteira.mesReferencia} de ${dadosCarteira.anoReferencia}`;
    dbg('📅 Data: ' + dadosCarteira.dataReferencia);
  }
  
  // 2. Rentabilidade Mensal e %CDI - procurar na linha MÊS
  // Padrão: "MÊS   - R$ 195,46   - 0,16 %   - 13,56 %"
  let mesMatch = textoCompleto.match(/M[ÊE]S[\s\S]*?-\s*R\$\s*[\d\.]+,\d{2}\s+([+-]?\s*\d{1,3}\s*,\s*\d{2})\s*%\s+([+-]?\s*\d{1,3}\s*,\s*\d{2})\s*%/i);
  if (mesMatch) {
    dadosCarteira.rentabilidadeMensal = parseFloat(mesMatch[1].replace(/\s/g, '').replace(',', '.'));
    dadosCarteira.pctCdi = parseFloat(mesMatch[2].replace(/\s/g, '').replace(',', '.'));
    dbg('📈 Rentabilidade Mensal: ' + dadosCarteira.rentabilidadeMensal + '%');
    dbg('📊 %CDI: ' + dadosCarteira.pctCdi + '%');
  } else {
    // Fallback: buscar linha com "MÊS" e números
    let fallbackMatch = textoCompleto.match(/M[ÊE]S[^\d]*(\d+,\d{2})%\s*(\d+,\d{2})%/i);
    if (fallbackMatch) {
      dadosCarteira.rentabilidadeMensal = parseFloat(fallbackMatch[1].replace(',', '.'));
      dadosCarteira.pctCdi = parseFloat(fallbackMatch[2].replace(',', '.'));
      dbg('📈 Rentabilidade (fallback): ' + dadosCarteira.rentabilidadeMensal + '%');
    }
  }
  
  // 3. Extrair alocações e retornos da seção Estratégias
  let estrategiasIndex = textoCompleto.indexOf('Estratégias');
  if (estrategiasIndex !== -1) {
    let secao = textoCompleto.substring(estrategiasIndex, estrategiasIndex + 2000);
    dbg('=== SEÇÃO Estratégias ===');
    dbg(secao.substring(0, 1200));
    
    // Mapeamento de nomes do PDF para nomes do sistema
    const mapping = {
      "Pós Fixado": "Renda Fixa Pós",
      "Pré Fixado": "Renda Fixa Pré",
      "Inflação": "Renda Fixa Inflação",
      "Infl aç ão": "Renda Fixa Inflação",
      "Multimercado": "Multiestratégia",
      "Renda Variável Brasil": "Renda Variável",
      "Alternativo": "Alternativo",
      "Renda Variável Global": "Renda Variável Global",
      "Fundos Listados": "Fundos Listados",
      "Caixa": "Caixa",
      "Renda Fixa Global": "Renda Fixa Global"
    };
    
    // Padrão para capturar cada linha da tabela
    // Ex: "Pós Fixado   ( 51 , 74 %)   R $   58 . 240 , 53   1 , 23 %   3 , 49 %"
    let regex = /([A-Za-zÀ-Úà-û\s]+?)\s*\(\s*(\d{1,3})\s*,\s*(\d{2})\s*%\)\s*R\$\s*[\d\.]+,\d{2}\s+([+-]?\s*\d{1,3}\s*,\s*\d{2})\s*%/i;
    let lines = secao.split(/\n/);
    
    for (let linha of lines) {
      let match = linha.match(regex);
      if (match) {
        let nomePDF = match[1].trim();
        let alocacao = parseFloat(match[2] + '.' + match[3]);
        let retorno = parseFloat(match[4].replace(/\s/g, '').replace(',', '.'));
        
        // Mapear nome
        let nomeSistema = mapping[nomePDF] || nomePDF;
        
        if (nomeSistema && alocacao > 0) {
          dadosCarteira.alocacoes[nomeSistema] = alocacao;
          dadosCarteira.retornos[nomeSistema] = retorno;
          dbg(`✅ ${nomePDF} → ${nomeSistema}: ${alocacao}% | retorno: ${retorno}%`);
        }
      }
    }
    
    // Fallback: buscar padrão mais simples
    if (Object.keys(dadosCarteira.alocacoes).length === 0) {
      let simpleRegex = /([A-Za-zÀ-Úà-û\s]+?)\s*\(\s*(\d{1,3}),(\d{2})\s*%/gi;
      let simpleMatch;
      while ((simpleMatch = simpleRegex.exec(secao)) !== null) {
        let nomePDF = simpleMatch[1].trim();
        let alocacao = parseFloat(simpleMatch[2] + '.' + simpleMatch[3]);
        let nomeSistema = mapping[nomePDF] || nomePDF;
        if (nomeSistema && alocacao > 0 && !dadosCarteira.alocacoes[nomeSistema]) {
          dadosCarteira.alocacoes[nomeSistema] = alocacao;
          dbg(`✅ (fallback) ${nomePDF} → ${nomeSistema}: ${alocacao}%`);
        }
      }
    }
  }
  
  // 4. Patrimônio
  let patMatch = textoCompleto.match(/PATRIM[OÔ]NIO\s*TOTAL\s*BRUTO[:\s]*R\$\s*([\d\.]+,\d{2})/i);
  if (patMatch) {
    dadosCarteira.patrimonio = parseFloat(patMatch[1].replace(/\./g, '').replace(',', '.'));
    dbg('💰 Patrimônio: R$ ' + dadosCarteira.patrimonio);
  }
  
  dbg('\n=== RESUMO FINAL ===');
  dbg('Data: ' + dadosCarteira.dataReferencia);
  dbg('Rentabilidade Mensal: ' + (dadosCarteira.rentabilidadeMensal !== null ? dadosCarteira.rentabilidadeMensal + '%' : 'não encontrada'));
  dbg('%CDI: ' + (dadosCarteira.pctCdi !== null ? dadosCarteira.pctCdi + '%' : 'não encontrado'));
  dbg('Alocações: ' + JSON.stringify(dadosCarteira.alocacoes));
  dbg('Retornos: ' + JSON.stringify(dadosCarteira.retornos));
  
  return { res: dadosCarteira.alocacoes, patrimonio: dadosCarteira.patrimonio };
}

function renderInputs() {
  let container = document.getElementById('inputsAtual');
  container.innerHTML = '';
  CLASSES.forEach((classe, idx) => {
    let row = document.createElement('div');
    row.className = 'classe-row';
    row.innerHTML = '<div class="dot8 ' + CORES[idx] + '"></div><span class="classe-nome">' + classe + '</span><input class="classe-input" type="number" step="any" min="0" max="100" value="0" id="inp_' + idx + '"><span class="pct-label">%</span>';
    container.appendChild(row);
    inputsMap[classe] = row.querySelector('input');
    inputsMap[classe].addEventListener('input', atualizarTotal);
  });
  atualizarTotal();
}

function renderAlvo() {
  let rec = PERFIS[perfilAtivo];
  document.getElementById('perfilLabel').textContent = perfilAtivo;
  let container = document.getElementById('tabelaAlvo');
  let classesAlvo = CLASSES.filter(c => c !== 'Caixa' && c !== 'Proventos' && c !== 'Fundos Listados');
  container.innerHTML = classesAlvo.map(c => '<div class="alvo-row"><div class="dot8 ' + CORES[CLASSES.indexOf(c)] + '"></div><span class="alvo-nome">' + c + '</span><div class="alvo-bar-wrap"><div class="alvo-bar-fill" style="width:' + rec[c] + '%"></div></div><span class="alvo-pct">' + rec[c] + '%</span></div>').join('');
}

function renderPerfis() {
  let container = document.getElementById('perfisRow');
  container.innerHTML = Object.keys(PERFIS).map(p => '<button class="perfil-btn ' + (p === perfilAtivo ? 'ativo' : '') + '" data-perfil="' + p + '">' + p + '</button>').join('');
  container.querySelectorAll('.perfil-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      perfilAtivo = btn.dataset.perfil;
      renderPerfis();
      renderAlvo();
      document.getElementById('resultArea').style.display = 'none';
    });
  });
}

function analisar() {
  let total = 0;
  let atual = {};
  CLASSES.forEach(c => { atual[c] = parseFloat(inputsMap[c]?.value || 0) || 0; total += atual[c]; });
  
  if (Math.abs(total - 100) > 1) {
    setStatus('Total deve ser próximo de 100% (atual: ' + fmtPct(total) + '). Tolerância de 1%', 'err');
    return;
  }
  
  let alvo = PERFIS[perfilAtivo];
  let nManter = 0, nAlocar = 0, nRetirar = 0;
  let classesAnalise = CLASSES.filter(c => c !== 'Caixa' && c !== 'Proventos' && c !== 'Fundos Listados');
  
  let html = classesAnalise.map(c => {
    let diff = alvo[c] - atual[c];
    let valorMovimentar = Math.abs(diff * dadosCarteira.patrimonio / 100);
    let badgeClass, label, valorClass;
    if (Math.abs(diff) < 0.05) { badgeClass = 'b-manter'; label = '✓ Manter'; valorClass = 'manter'; nManter++; }
    else if (diff > 0) { badgeClass = 'b-alocar'; label = '↑ Alocar +' + fmtPct(diff); valorClass = 'alocar'; nAlocar++; }
    else { badgeClass = 'b-retirar'; label = '↓ Retirar ' + fmtPct(Math.abs(diff)); valorClass = 'retirar'; nRetirar++; }
    let valorDisplay = Math.abs(diff) < 0.05 ? 'R$ 0,00' : fmtBRL(valorMovimentar);
    return '<div class="rec-row"><div class="dot8 ' + CORES[CLASSES.indexOf(c)] + '"></div><span class="rec-nome">' + c + '</span><span class="rec-nums">' + fmtPct(atual[c]) + ' → ' + alvo[c] + '%</span><span class="rec-valor ' + valorClass + '">' + valorDisplay + '</span><span class="badge ' + badgeClass + '">' + label + '</span></div>';
  }).join('');
  
  document.getElementById('listaRec').innerHTML = html;
  document.getElementById('resumoGrid').innerHTML = '<div class="resumo-item"><div class="resumo-label">Manter</div><div class="resumo-val" style="color:var(--amber)">' + nManter + '</div></div><div class="resumo-item"><div class="resumo-label">Alocar</div><div class="resumo-val" style="color:var(--green)">' + nAlocar + '</div></div><div class="resumo-item"><div class="resumo-label">Retirar</div><div class="resumo-val" style="color:var(--red)">' + nRetirar + '</div></div><div class="resumo-item"><div class="resumo-label">Perfil</div><div class="resumo-val" style="color:var(--gold);font-size:14px">' + perfilAtivo + '</div></div>';
  document.getElementById('resultArea').style.display = 'block';
}

// Eventos
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    let tabId = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
  });
});

document.getElementById('btnToggleDebug').addEventListener('click', () => {
  document.getElementById('debugBox').classList.toggle('show');
  document.getElementById('debugArrow').classList.toggle('rotated');
});

document.getElementById('filePdf').addEventListener('change', function() {
  document.getElementById('fileName').textContent = this.files[0]?.name || 'Selecionar arquivo PDF...';
});

document.getElementById('btnImportar').addEventListener('click', async () => {
  let file = document.getElementById('filePdf').files[0];
  if (!file) { setStatus('Selecione um arquivo PDF primeiro.', 'err'); return; }
  clearDebug();
  document.getElementById('overlay').classList.add('show');
  try {
    let result = await extrairDadosPDF(file);
    let res = result.res;
    let patrimonio = result.patrimonio;
    dadosCarteira.patrimonio = patrimonio;
    
    // Preencher inputs com dados extraídos
    for (let classe of CLASSES) {
      if (inputsMap[classe]) {
        inputsMap[classe].value = (res[classe] !== undefined && res[classe] > 0) ? res[classe].toFixed(2) : '0';
      }
    }
    atualizarTotal();
    document.getElementById('relatorioConteudo').innerHTML = gerarRelatorioHTML();
    setStatus('✅ PDF importado com sucesso! Relatório gerado.', 'ok');
    if (dadosCarteira.patrimonio > 0) {
      document.getElementById('patrimVal').innerHTML = fmtBRL(dadosCarteira.patrimonio);
      document.getElementById('patrimTag').classList.add('show');
    }
  } catch (e) {
    setStatus('Erro: ' + e.message, 'err');
    dbg('ERRO: ' + e.message);
  } finally {
    document.getElementById('overlay').classList.remove('show');
  }
});

document.getElementById('btnLimpar').addEventListener('click', () => {
  CLASSES.forEach(c => { if (inputsMap[c]) inputsMap[c].value = '0'; });
  dadosCarteira = {
    alocacoes: {},
    retornos: {},
    rentabilidadeMensal: null,
    pctCdi: null,
    dataReferencia: "",
    patrimonio: 0,
    mesReferencia: "",
    anoReferencia: ""
  };
  atualizarTotal();
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('status').classList.remove('show');
  document.getElementById('patrimTag').classList.remove('show');
  document.getElementById('relatorioConteudo').innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text3);">⚡ Importe um PDF para gerar o relatório automático</div>';
  clearDebug();
  document.getElementById('filePdf').value = '';
  document.getElementById('fileName').textContent = 'Selecionar arquivo PDF...';
});

document.getElementById('btnAnalisar').addEventListener('click', analisar);
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
});

(function init() {
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
  document.getElementById('hDate').textContent = new Date().toLocaleDateString('pt-BR');
  renderInputs(); renderPerfis(); renderAlvo();
})();
</script>
