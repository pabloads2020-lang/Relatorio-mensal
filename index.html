<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBF · Relatório Mensal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
  --amber: #f39c12; --amber-bg: rgba(243,156,18,0.12);
  --blue: #3498db; --blue-bg: rgba(52,152,219,0.12);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --debug-bg: #1c2333; --overlay-bg: rgba(14,17,23,.88);
  --footer-border: rgba(255,255,255,0.07);
  --relatorio-bg: linear-gradient(135deg, rgba(245,200,66,0.03) 0%, rgba(52,152,219,0.03) 100%);
}
body.light {
  --bg: #f5f7fa; --bg2: #ffffff; --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #d4a017; --gold2: #b8860b;
  --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
  --green: #27ae60; --green-bg: rgba(39,174,96,0.1);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.1);
  --amber: #e67e22; --amber-bg: rgba(230,126,34,0.1);
  --header-bg: #ffffff; --header-border: rgba(0,0,0,0.08);
  --card-bg: #ffffff; --card-border: rgba(0,0,0,0.08);
  --debug-bg: #f7fafc; --overlay-bg: rgba(255,255,255,.95);
  --footer-border: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.header-date { font-size: 13px; color: var(--text3); }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.main { max-width: 900px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.upload-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.file-label { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1.5px dashed var(--border2); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; color: var(--text2); flex: 1; min-width: 180px; }
.file-label:hover { border-color: var(--gold); color: var(--gold); }
#filePdf { display: none; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; white-space: nowrap; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.status { display: none; align-items: center; gap: 8px; padding: 9px 13px; border-radius: 8px; font-size: 14px; margin-top: 0.75rem; }
.status.show { display: flex; }
.status-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46, 204, 113, 0.25); }
.status-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231, 76, 60, 0.25); }
.patrim-tag { display: none; align-items: center; gap: 6px; margin-top: 0.6rem; background: rgba(245, 200, 66, 0.1); border: 1px solid rgba(245, 200, 66, 0.25); border-radius: 20px; padding: 6px 14px; font-size: 14px; font-weight: 600; color: var(--gold); width: fit-content; }
.patrim-tag.show { display: flex; }
.btn-debug { background: transparent; border: 1px solid var(--border2); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 500; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 6px; margin-top: 1rem; }
.btn-debug:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.1); }
.debug-box { display: none; background: var(--debug-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-size: 12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; margin-top: 0.5rem; font-family: monospace; }
.debug-box.show { display: block; }
.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
.overlay.show { display: flex; }
.spin { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.footer { text-align: center; font-size: 12px; color: var(--text3); padding: 2rem; border-top: 1px solid var(--footer-border); margin-top: 1rem; }
.arrow { transition: transform 0.2s ease; display: inline-block; }
.arrow.rotated { transform: rotate(90deg); }
.relatorio-container { background: var(--relatorio-bg); border-radius: 12px; padding: 1.5rem; }
.relatorio-saudacao { font-size: 15px; margin-bottom: 1.25rem; color: var(--gold); font-weight: 500; }
.relatorio-paragrafo { font-size: 14px; line-height: 1.6; margin-bottom: 1rem; color: var(--text); }
.relatorio-dados { background: var(--bg3); border-radius: 10px; padding: 1rem; margin: 1rem 0; border-left: 3px solid var(--gold); }
.relatorio-dados p { margin: 0.5rem 0; font-size: 14px; }
.relatorio-dados strong { color: var(--gold); }
.relatorio-classe-item { margin: 0.25rem 0; font-size: 14px; display: block; }
.relatorio-positivo { color: var(--green); }
.relatorio-negativo { color: var(--red); }
.relatorio-assinatura { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 13px; color: var(--text3); font-style: italic; }
.cenario-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; resize: vertical; margin-top: 0.5rem; }
.cenario-textarea:focus { outline: none; border-color: var(--gold); }
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div><div>Processando PDF...</div></div>

<header class="header">
  <div class="header-logo"><div class="dot">PBF</div>Relatório Mensal</div>
  <div class="header-right"><div class="header-date" id="hDate"></div><button class="theme-toggle" id="themeToggle">🌙</button></div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">📝 Cenário Macro do Mês</div>
    <textarea id="textoCenario" class="cenario-textarea" rows="5">O mês de abril de 2026 foi marcado por uma consolidação das expectativas econômicas globais e locais. No Brasil, o foco permaneceu na trajetória da inflação e no compromisso fiscal, fatores que influenciam diretamente o ritmo de queda da taxa Selic pelo Banco Central. No cenário global, a resiliência da economia norte-americana e a manutenção dos juros em patamares elevados pelo Fed continuam ditando o ritmo dos mercados, somadas às tensões geopolíticas que adicionam volatilidade aos preços das commodities e à percepção de risco dos investidores.</textarea>
  </div>

  <div class="card">
    <div class="card-title">📄 Importar relatório XP (PDF)</div>
    <div class="upload-row">
      <label class="file-label" for="filePdf">📎 <span id="fileName">Selecionar arquivo PDF...</span></label>
      <input type="file" id="filePdf" accept=".pdf">
      <button class="btn btn-gold" id="btnImportar">GERAR RELATÓRIO COMPLETO</button>
      <button class="btn btn-ghost" id="btnLimpar">Limpar</button>
    </div>
    <div id="status" class="status"></div>
    <div id="patrimTag" class="patrim-tag">💰 <span id="patrimVal"></span></div>
    
    <button class="btn-debug" id="btnToggleDebug"><span class="arrow" id="debugArrow">▶</span> Detalhes da leitura</button>
    <div id="debugBox" class="debug-box"></div>
  </div>

  <div class="card">
    <div class="card-title">📈 Relatório Mensal - Análise PBF</div>
    <div id="relatorioConteudo" class="relatorio-container">
      <div style="text-align: center; padding: 2rem; color: var(--text3);">
        ⚡ Importe um PDF para gerar o relatório automático
      </div>
    </div>
    <button class="btn btn-ghost" id="btnCopiar" style="margin-top: 1rem; width: auto;">📋 Copiar para WhatsApp</button>
  </div>
</main>

<footer class="footer">Material informativo — não constitui recomendação de investimento.</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let debugLines = [];
let dadosProcessados = null;

function fmtBRL(v) { return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits: 2}); }
function setStatus(msg, tipo) { 
  const el = document.getElementById('status'); 
  el.innerHTML = msg; 
  el.className = 'status show status-' + tipo; 
  setTimeout(() => el.classList.remove('show'), 4000); 
}
function dbg(txt) { debugLines.push(txt); document.getElementById('debugBox').textContent = debugLines.join('\n'); }
function clearDebug() { debugLines = []; document.getElementById('debugBox').textContent = ''; }

// FUNÇÃO MÁGICA DO GEMINI - Remove TODOS os espaços
function superLimpeza(texto) {
    return texto.replace(/\s+/g, '');
}

async function extrairDadosPDF(file) {
  let ab = await file.arrayBuffer();
  let pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  
  let dados = {
    alocacoes: {},
    retornos: {},
    patrimonio: null,
    rentabilidadeMensal: null,
    pctCdi: null,
    mesReferencia: "",
    anoReferencia: ""
  };
  
  // Processa apenas as primeiras 6 páginas
  for (let p = 1; p <= Math.min(pdf.numPages, 6); p++) {
    let page = await pdf.getPage(p);
    let textContent = await page.getTextContent();
    let textoOriginal = textContent.items.map(item => item.str).join(' ');
    
    // APLICA A SUPREMA LIMPEZA (remove todos os espaços)
    let textoLimpo = superLimpeza(textoOriginal);
    
    dbg(`\n--- PÁGINA ${p} (LIMPA) ---`);
    dbg(textoLimpo.substring(0, 800));
    
    // DATA (página 1)
    if (p === 1) {
      let dataMatch = textoLimpo.match(/DataDeReferência(\d{2})\/(\d{2})\/(\d{4})/);
      if (dataMatch) {
        let meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        dados.mesReferencia = meses[parseInt(dataMatch[2]) - 1];
        dados.anoReferencia = dataMatch[3];
        dbg(`📅 Data: ${dados.mesReferencia}/${dados.anoReferencia}`);
      }
    }
    
    // PATRIMÔNIO e RENTABILIDADE (página 2)
    let patMatch = textoLimpo.match(/PATRIMÔNIOTOTALBRUTO:R\$([\d\.]+,\d{2})/i);
    if (patMatch) {
      dados.patrimonio = patMatch[1];
      dbg(`💰 Patrimônio: R$ ${dados.patrimonio}`);
    }
    
    // Rentabilidade e %CDI - padrão: R$28.978,371,40%197,26%
    let rentMatch = textoLimpo.match(/R\$[\d\.]+,\d{2}([\d,]+)%([\d,]+)%/i);
    if (rentMatch && !dados.rentabilidadeMensal) {
      dados.rentabilidadeMensal = rentMatch[1].replace(',', '.');
      dados.pctCdi = rentMatch[2].replace(',', '.');
      dbg(`📈 Rentabilidade Mensal: ${dados.rentabilidadeMensal}%`);
      dbg(`📊 %CDI: ${dados.pctCdi}%`);
    }
    
    // ESTRATÉGIAS - busca por cada classe
    const classes = [
      { busca: 'PósFixado', nome: 'Pós-Fixado' },
      { busca: 'Inflação', nome: 'Inflação' },
      { busca: 'PréFixado', nome: 'Pré-Fixado' },
      { busca: 'RendaVariávelBrasil', nome: 'Renda Variável Brasil' },
      { busca: 'Alternativo', nome: 'Alternativo' },
      { busca: 'RendaVariávelGlobal', nome: 'Renda Variável Global' },
      { busca: 'Multimercado', nome: 'Multimercado' }
    ];
    
    for (let item of classes) {
      // Padrão: PósFixado(36,75%)R$761.750,290,66%
      let regex = new RegExp(item.busca + '\\((\\d+),(\\d+)%\\)R\\$[\\d\\.]+,\\d+(\\d+),(\\d+)%', 'i');
      let match = regex.exec(textoLimpo);
      if (match) {
        let alocacao = match[1] + ',' + match[2];
        let retorno = match[3] + ',' + match[4];
        dados.alocacoes[item.nome] = alocacao;
        dados.retornos[item.nome] = retorno;
        dbg(`✅ ${item.nome}: alocação ${alocacao}%, retorno ${retorno}%`);
      }
    }
  }
  
  dbg('\n=== RESUMO FINAL ===');
  dbg(`Data: ${dados.mesReferencia}/${dados.anoReferencia}`);
  dbg(`Rentabilidade: ${dados.rentabilidadeMensal}%`);
  dbg(`%CDI: ${dados.pctCdi}%`);
  dbg(`Patrimônio: R$ ${dados.patrimonio}`);
  dbg('Alocações:', JSON.stringify(dados.alocacoes));
  dbg('Retornos:', JSON.stringify(dados.retornos));
  
  return dados;
}

function gerarRelatorioHTML(dados) {
  let mes = dados.mesReferencia || "abril";
  let ano = dados.anoReferencia || "2026";
  let rentabilidade = dados.rentabilidadeMensal;
  let pctCdi = dados.pctCdi;
  let patrimonio = dados.patrimonio;
  let alocacoes = dados.alocacoes;
  let retornos = dados.retornos;
  
  // Pega o cenário do textarea
  let cenario = document.getElementById('textoCenario').value;
  
  // Constrói o texto de desempenho por classe
  let desempenhoTexto = "";
  let ordem = ['Pós-Fixado', 'Pré-Fixado', 'Inflação', 'Multimercado', 'Alternativo', 'Renda Variável Brasil', 'Renda Variável Global'];
  
  for (let nome of ordem) {
    if (alocacoes[nome] && retornos[nome]) {
      let aloc = alocacoes[nome].replace(',', '.');
      let ret = retornos[nome].replace(',', '.');
      let retNum = parseFloat(ret);
      let cor = retNum >= 0 ? 'relatorio-positivo' : 'relatorio-negativo';
      let movimento = retNum >= 0 ? 'valorização de' : 'queda de';
      let sinal = retNum >= 0 ? '+' : '';
      desempenhoTexto += `<span class="relatorio-classe-item">• <strong>${nome}</strong> (${aloc}% da carteira): ${movimento} <span class="${cor}">${sinal}${ret}%</span> no mês</span>`;
    }
  }
  
  if (desempenhoTexto === "") {
    desempenhoTexto = "<span class=\"relatorio-classe-item\">⚠️ Não foi possível capturar os retornos individuais das classes no PDF.</span>";
  }
  
  let rentabilidadeStr = rentabilidade ? `${rentabilidade.replace(',', '.')}%` : "não disponível";
  let pctCdiStr = pctCdi ? `${pctCdi.replace(',', '.')}%` : "não disponível";
  let sinalRentabilidade = (rentabilidade && parseFloat(rentabilidade.replace(',', '.')) >= 0) ? 'positivo' : 'negativo';
  let sinalClasse = (rentabilidade && parseFloat(rentabilidade.replace(',', '.')) >= 0) ? 'relatorio-positivo' : 'relatorio-negativo';
  
  let html = `
    <div class="relatorio-saudacao">📋 Prezado cliente, tudo bem? Segue o seu relatório mensal.</div>
    
    <div class="relatorio-paragrafo">
      ${cenario}
    </div>
    
    <div class="relatorio-dados">
      <p>📊 <strong>Desempenho da sua carteira:</strong></p>
      <p>Sua carteira atravessou esse ambiente com solidez, apresentando um retorno <strong class="${sinalClasse}">${sinalRentabilidade} de ${rentabilidadeStr}</strong> no mês de ${mes.toLowerCase()} de ${ano}, <strong>equivalente a ${pctCdiStr} do CDI</strong> do período.</p>
    </div>
  `;
  
  if (patrimonio) {
    html += `<div class="relatorio-paragrafo">💰 <strong>Patrimônio atual:</strong> ${fmtBRL(parseFloat(patrimonio.replace(/\./g, '').replace(',', '.')))}</div>`;
  }
  
  if (desempenhoTexto) {
    html += `<div class="relatorio-paragrafo"><strong>📈 Desempenho por classe de ativo no mês:</strong><br>${desempenhoTexto}</div>`;
  }
  
  html += `
    <div class="relatorio-paragrafo">
      Por fim, reforçamos a importância da disciplina na manutenção da estratégia e nos aportes focando no desenvolvimento da carteira no longo prazo. 
      Essa postura é fundamental para atravessar diferentes ciclos de mercado, aproveitar oportunidades, reduzir os impactos das oscilações no curto prazo 
      e manter a carteira alinhada aos seus objetivos financeiros.
    </div>
    
    <div class="relatorio-assinatura">
      Atenciosamente,<br>
      Equipe PBF Investimentos
    </div>
  `;
  
  return html;
}

// Eventos
document.getElementById('btnToggleDebug').addEventListener('click', () => {
  document.getElementById('debugBox').classList.toggle('show');
  document.getElementById('debugArrow').classList.toggle('rotated');
});

document.getElementById('filePdf').addEventListener('change', function() {
  document.getElementById('fileName').textContent = this.files[0]?.name || 'Selecionar arquivo PDF...';
});

document.getElementById('btnCopiar').addEventListener('click', async () => {
  const texto = document.getElementById('relatorioConteudo').innerText;
  try {
    await navigator.clipboard.writeText(texto);
    setStatus('✅ Texto copiado para a área de transferência!', 'ok');
  } catch (err) {
    setStatus('❌ Erro ao copiar texto', 'err');
  }
});

document.getElementById('btnImportar').addEventListener('click', async () => {
  let file = document.getElementById('filePdf').files[0];
  if (!file) { setStatus('Selecione um arquivo PDF primeiro.', 'err'); return; }
  clearDebug();
  document.getElementById('overlay').classList.add('show');
  try {
    let dados = await extrairDadosPDF(file);
    dadosProcessados = dados;
    document.getElementById('relatorioConteudo').innerHTML = gerarRelatorioHTML(dados);
    setStatus('✅ PDF importado com sucesso! Relatório gerado.', 'ok');
    if (dados.patrimonio) {
      document.getElementById('patrimVal').innerHTML = fmtBRL(parseFloat(dados.patrimonio.replace(/\./g, '').replace(',', '.')));
      document.getElementById('patrimTag').classList.add('show');
    }
  } catch (e) {
    setStatus('Erro ao processar PDF: ' + e.message, 'err');
    dbg('ERRO: ' + e.message);
  } finally {
    document.getElementById('overlay').classList.remove('show');
  }
});

document.getElementById('btnLimpar').addEventListener('click', () => {
  dadosProcessados = null;
  document.getElementById('status').classList.remove('show');
  document.getElementById('patrimTag').classList.remove('show');
  document.getElementById('relatorioConteudo').innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text3);">⚡ Importe um PDF para gerar o relatório automático</div>';
  clearDebug();
  document.getElementById('filePdf').value = '';
  document.getElementById('fileName').textContent = 'Selecionar arquivo PDF...';
});

document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
});

(function init() {
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
  document.getElementById('hDate').textContent = new Date().toLocaleDateString('pt-BR');
})();
</script>
</body>
</html>
