<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Texto - Relatório XP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #0f172a;
      --accent: #eab308;
      --ok: #16a34a;
      --bad: #dc2626;
      --info: #2563eb;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      color: var(--brand);
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .upload-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .file-label {
      flex: 1;
      min-width: 260px;
      border: 1.5px dashed #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      color: var(--muted);
      background: #fafafa;
    }

    #pdfFile { display: none; }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { opacity: .94; }
    .btn-light { background: #eef2ff; color: #3730a3; }
    .btn-light:hover { opacity: .92; }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .status.show { display: block; }
    .status.ok { background: #ecfdf3; color: #166534; border: 1px solid #bbf7d0; }
    .status.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fcfcfd;
    }

    .kpi .label { color: var(--muted); font-size: 12px; }
    .kpi .value { margin-top: 4px; font-weight: 700; font-size: 16px; }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      font-size: 13px;
      color: #374151;
      font-weight: 600;
    }

    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      resize: vertical;
      min-height: 44px;
      font-family: inherit;
    }

    textarea { min-height: 92px; }

    .preview {
      white-space: pre-wrap;
      line-height: 1.6;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: #fffeff;
      min-height: 220px;
    }

    .asset-list {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .asset-row {
      display: grid;
      grid-template-columns: 1.4fr .8fr .8fr .6fr;
      gap: 8px;
      padding: 10px 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .asset-row:last-child { border-bottom: 0; }
    .asset-head { font-weight: 700; background: #f8fafc; }
    .pos { color: var(--ok); font-weight: 600; }
    .neg { color: var(--bad); font-weight: 600; }
    .neu { color: #64748b; font-weight: 600; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 10;
      font-size: 16px;
      font-weight: 600;
    }

    .overlay.show { display: flex; }

    @media (max-width: 800px) {
      .asset-row { grid-template-columns: 1fr; }
      .asset-head { display: none; }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">Processando PDF...</div>

  <div class="container">
    <header class="header">
      <div>
        <h1 class="title">Gerador de Texto Mensal (XP)</h1>
        <p class="subtitle">Upload do PDF + contexto editável + preview + cópia em 1 clique</p>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h3>1) Importação do PDF</h3>
        <div class="upload-row">
          <label class="file-label" for="pdfFile">📎 <span id="fileName">Selecione um PDF de relatório XP...</span></label>
          <input id="pdfFile" type="file" accept=".pdf" />
          <button class="btn btn-primary" id="btnProcessar">Importar e Extrair</button>
          <button class="btn btn-light" id="btnLimpar">Limpar</button>
        </div>
        <div id="status" class="status"></div>

        <div class="kpis" id="kpis"></div>
      </section>

      <section class="card">
        <h3>2) Contexto do mês (editável)</h3>
        <div class="field">
          <label for="clienteNome">Nome do cliente (editável)</label>
          <input id="clienteNome" type="text" placeholder="Nome do cliente" />
        </div>

        <div class="field">
          <label for="ctxBrasil">Parágrafo sobre mercado brasileiro</label>
          <textarea id="ctxBrasil"></textarea>
        </div>

        <div class="field">
          <label for="ctxGlobal">Parágrafo sobre mercado global</label>
          <textarea id="ctxGlobal"></textarea>
        </div>

        <div class="field">
          <label for="ctxFinal">Parágrafo final motivacional</label>
          <textarea id="ctxFinal"></textarea>
        </div>

        <button class="btn btn-primary" id="btnAtualizar">Atualizar preview</button>
      </section>

      <section class="card">
        <h3>3) Classes de ativos extraídas</h3>
        <div class="asset-list" id="assetList"></div>
      </section>

      <section class="card">
        <h3>4) Texto gerado</h3>
        <div class="preview" id="preview">Importe um PDF para gerar o texto automaticamente.</div>
        <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn btn-primary" id="btnCopiar">Copiar texto formatado</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const monthNames = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

    const state = {
      data: null,
      generatedText: ''
    };

    function stripAccents(text) {
      return text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function normalizeText(text) {
      return text
        .replace(/ﬂ/g, 'fl')
        .replace(/ﬁ/g, 'fi')
        .replace(/\u00a0/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function normalizeSearch(text) {
      return stripAccents(normalizeText(text)).toUpperCase();
    }

    function brToNumber(raw) {
      if (!raw) return null;
      const cleaned = raw.replace(/\./g, '').replace(',', '.').replace(/\s+/g, '');
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : null;
    }

    function fmtPct(num, signed = false) {
      if (num === null || num === undefined || Number.isNaN(num)) return 'n/d';
      const sign = signed && num > 0 ? '+' : '';
      return `${sign}${num.toFixed(2).replace('.', ',')}%`;
    }

    function fmtBRL(num) {
      if (num === null || num === undefined || Number.isNaN(num)) return 'n/d';
      return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function showStatus(msg, type = 'ok') {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = `status show ${type}`;
    }

    function clearStatus() {
      const status = document.getElementById('status');
      status.className = 'status';
      status.textContent = '';
    }

    function getMonthYear(dateBr) {
      if (!dateBr) return { mes: '', ano: '', mesAnoLabel: '' };
      const [dd, mm, yyyy] = dateBr.split('/');
      const monthIdx = Number(mm) - 1;
      const mes = monthNames[monthIdx] || '';
      const ano = yyyy || '';
      return { mes, ano, mesAnoLabel: mes ? `${mes} de ${ano}` : '' };
    }

    function capitalize(text = '') {
      if (!text) return '';
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    async function extractRawTextByPage(file) {
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;

      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent({ normalizeWhitespace: true });

        const items = textContent.items
          .map(item => ({
            str: (item.str || '').trim(),
            x: item.transform?.[4] ?? 0,
            y: item.transform?.[5] ?? 0
          }))
          .filter(item => item.str.length);

        items.sort((a, b) => {
          if (Math.abs(b.y - a.y) > 2.5) return b.y - a.y;
          return a.x - b.x;
        });

        const lines = [];
        for (const item of items) {
          const last = lines[lines.length - 1];
          if (!last || Math.abs(last.y - item.y) > 2.5) {
            lines.push({ y: item.y, text: item.str });
          } else {
            last.text += ` ${item.str}`;
          }
        }

        pages.push(lines.map(l => l.text).join('\n'));
      }

      return pages;
    }

    function extractClientName(rawText) {
      const patterns = [
        /Signature\s+([A-ZÀ-Ú][A-Za-zÀ-ÖØ-öø-ÿ'’´`.-]+(?:\s+[A-ZÀ-Ú][A-Za-zÀ-ÖØ-öø-ÿ'’´`.-]+){1,5})\s+\d{2}\/\d{2}\/\d{4}/i,
        /Parceiro\s+([A-ZÀ-Ú][A-Za-zÀ-ÖØ-öø-ÿ'’´`.-]+(?:\s+[A-ZÀ-Ú][A-Za-zÀ-ÖØ-öø-ÿ'’´`.-]+){1,5})\s+\d{2}\/\d{2}\/\d{4}/i
      ];

      for (const p of patterns) {
        const m = rawText.match(p);
        if (m && m[1]) return m[1].trim();
      }
      return '';
    }

    function extractPortfolioData(rawText, rawLinesText, normalizedSearchText, compactSearchText) {
      const result = {
        nomeCliente: extractClientName(rawText),
        dataReferencia: null,
        rentabilidadeMes: null,
        cdiMes: null,
        rentabilidadeAno: null,
        patrimonioTotal: null,
        pctCdiCalculado: null,
        classes: []
      };

      let m = normalizedSearchText.match(/DATA DE REFERENCIA\s*:?\s*(\d{2}\/\d{2}\/\d{4})/);
      if (!m) m = compactSearchText.match(/DATADEREFERENCIA:?\s*(\d{2}\/\d{2}\/\d{4})/);
      if (!m) m = normalizedSearchText.match(/(\d{2}\/\d{2}\/\d{4})/);
      if (m) result.dataReferencia = m[1];

      m = normalizedSearchText.match(/RENTABILIDADE\s*M\s*E\s*S\s*:?\s*([+-]?\d+,\d{2})%/);
      if (!m) m = compactSearchText.match(/RENTABILIDADEMES:?([+-]?\d+,\d{2})%/);
      if (m) result.rentabilidadeMes = brToNumber(m[1]);

      m = normalizedSearchText.match(/\bCDI\s+([+-]?\d+,\d{2})%\s+[+-]?\d+,\d{2}%\s+[+-]?\d+,\d{2}%\s+[+-]?\d+,\d{2}%/);
      if (!m) m = normalizedSearchText.match(/\bCDI\s+([+-]?\d+,\d{2})%/);
      if (!m) m = compactSearchText.match(/CDI([+-]?\d+,\d{2})%/);
      if (m) result.cdiMes = brToNumber(m[1]);

      m = normalizedSearchText.match(/PORTFOLIO\s+[+-]?\d+,\d{2}%\s+([+-]?\d+,\d{2})%\s+[+-]?\d+,\d{2}%\s+[+-]?\d+,\d{2}%/);
      if (!m) m = compactSearchText.match(/PORTFOLIO[+-]?\d+,\d{2}%([+-]?\d+,\d{2})%[+-]?\d+,\d{2}%[+-]?\d+,\d{2}%/);
      if (!m) m = normalizedSearchText.match(/ANO\s+R\$\s*[\d\.]+,\d{2}\s+([+-]?\d+,\d{2})%/);
      if (m) result.rentabilidadeAno = brToNumber(m[1]);

      m = normalizedSearchText.match(/PATRIMONIO TOTAL BRUTO\s*:?\s*R\$\s*([\d\.]+,\d{2})/);
      if (!m) m = compactSearchText.match(/PATRIMONIOTOTALBRUTO:?R\$([\d\.]+,\d{2})/);
      if (m) result.patrimonioTotal = brToNumber(m[1]);

      if (result.rentabilidadeMes !== null && result.cdiMes !== null && result.cdiMes !== 0) {
        result.pctCdiCalculado = (result.rentabilidadeMes / result.cdiMes) * 100;
      }

      const mapName = {
        'POS FIXADO': 'Pós-fixada',
        'PRE FIXADO': 'Pré-fixada',
        'INFLACAO': 'Inflação',
        'MULTIMERCADO': 'Multimercado',
        'RENDA VARIAVEL BRASIL': 'Renda Variável Brasil',
        'RENDA VARIAVEL GLOBAL': 'Renda Variável Global',
        'ALTERNATIVO': 'Alternativo',
        'CAIXA': 'Caixa',
        'PROVENTOS': 'Proventos',
        'POSFIXADO': 'Pós-fixada',
        'PREFIXADO': 'Pré-fixada',
        'RENDAVARIAVELBRASIL': 'Renda Variável Brasil',
        'RENDAVARIAVELGLOBAL': 'Renda Variável Global'
      };

      const allocByKey = {};
      const retByKey = {};

      const aliases = {
        'POS FIXADO': ['POS FIXADO', 'POSFIXADO'],
        'PRE FIXADO': ['PRE FIXADO', 'PREFIXADO'],
        'INFLACAO': ['INFLACAO'],
        'MULTIMERCADO': ['MULTIMERCADO'],
        'RENDA VARIAVEL BRASIL': ['RENDA VARIAVEL BRASIL', 'RENDAVARIAVELBRASIL'],
        'RENDA VARIAVEL GLOBAL': ['RENDA VARIAVEL GLOBAL', 'RENDAVARIAVELGLOBAL'],
        'ALTERNATIVO': ['ALTERNATIVO'],
        'CAIXA': ['CAIXA'],
        'PROVENTOS': ['PROVENTOS']
      };

      const setAlloc = (key, value) => {
        const n = brToNumber(value);
        if (n !== null && n >= 0 && n <= 100 && allocByKey[key] === undefined) allocByKey[key] = n;
      };

      const setRet = (key, value) => {
        const n = brToNumber(value);
        if (n !== null && retByKey[key] === undefined) retByKey[key] = n;
      };

      const allocRegex = /(POS FIXADO|PRE FIXADO|INFLACAO|MULTIMERCADO|RENDA VARIAVEL BRASIL|RENDA VARIAVEL GLOBAL|ALTERNATIVO|CAIXA|PROVENTOS)\s*\(\s*(\d{1,3}\s*,\s*\d{2})\s*%\s*\)/g;
      const retRegex = /(POS FIXADO|PRE FIXADO|INFLACAO|MULTIMERCADO|RENDA VARIAVEL BRASIL|RENDA VARIAVEL GLOBAL|ALTERNATIVO|CAIXA|PROVENTOS)\s+([+-]?\d{1,3}\s*,\s*\d{2})\s*%\s+[+-]?\d{1,3}\s*,\s*\d{2}\s*%\s+[+-]?\d{1,3}\s*,\s*\d{2}\s*%\s+[+-]?\d{1,3}\s*,\s*\d{2}\s*%/g;
      const allocRegexCompact = /(POSFIXADO|PREFIXADO|INFLACAO|MULTIMERCADO|RENDAVARIAVELBRASIL|RENDAVARIAVELGLOBAL|ALTERNATIVO|CAIXA|PROVENTOS)\((\d{1,3},\d{2})%\)/g;
      const retRegexCompact = /(POSFIXADO|PREFIXADO|INFLACAO|MULTIMERCADO|RENDAVARIAVELBRASIL|RENDAVARIAVELGLOBAL|ALTERNATIVO|CAIXA|PROVENTOS)([+-]?\d{1,3},\d{2})%[+-]?\d{1,3},\d{2}%[+-]?\d{1,3},\d{2}%[+-]?\d{1,3},\d{2}%/g;

      let hit;
      while ((hit = allocRegex.exec(normalizedSearchText)) !== null) setAlloc(hit[1], hit[2]);
      while ((hit = retRegex.exec(normalizedSearchText)) !== null) setRet(hit[1], hit[2]);
      while ((hit = allocRegexCompact.exec(compactSearchText)) !== null) setAlloc(hit[1], hit[2]);
      while ((hit = retRegexCompact.exec(compactSearchText)) !== null) setRet(hit[1], hit[2]);

      // fallback linha a linha (mais robusto para PDFs com quebras estranhas)
      const lines = rawLinesText
        .split('\n')
        .map(line => normalizeSearch(line))
        .filter(Boolean);

      for (const [key, aliasList] of Object.entries(aliases)) {
        if (allocByKey[key] !== undefined && retByKey[key] !== undefined) continue;

        for (const line of lines) {
          if (!aliasList.some(alias => line.includes(alias))) continue;

          if (allocByKey[key] === undefined) {
            const ma = line.match(/\(\s*(\d{1,3}\s*,\s*\d{2})\s*%\s*\)/);
            if (ma) setAlloc(key, ma[1]);
          }

          if (retByKey[key] === undefined) {
            const allPcts = [...line.matchAll(/([+-]?\d{1,3}\s*,\s*\d{2})\s*%/g)].map(v => v[1]);
            if (allPcts.length >= 1) setRet(key, allPcts[0]);
          }

          if (allocByKey[key] !== undefined && retByKey[key] !== undefined) break;
        }
      }

      Object.keys(mapName).forEach((key) => {
        if (allocByKey[key] !== undefined && retByKey[key] !== undefined && allocByKey[key] > 0) {
          result.classes.push({ nome: mapName[key], alocacao: allocByKey[key], retorno: retByKey[key] });
        }
      });

      const dedup = new Map();
      result.classes.forEach((c) => {
        if (!dedup.has(c.nome)) dedup.set(c.nome, c);
      });
      result.classes = Array.from(dedup.values()).sort((a, b) => b.alocacao - a.alocacao);
      return result;
    }

    function renderKpis(data) {
      const { mesAnoLabel } = getMonthYear(data.dataReferencia);
      const kpis = [
        ['Cliente', data.nomeCliente || 'n/d'],
        ['Mês de referência', mesAnoLabel ? capitalize(mesAnoLabel) : 'n/d'],
        ['Rentabilidade no mês', fmtPct(data.rentabilidadeMes)],
        ['CDI do período', fmtPct(data.cdiMes)],
        ['% do CDI (calculado)', fmtPct(data.pctCdiCalculado)],
        ['Rentabilidade no ano', fmtPct(data.rentabilidadeAno)],
        ['Patrimônio total bruto', fmtBRL(data.patrimonioTotal)]
      ];

      document.getElementById('kpis').innerHTML = kpis
        .map(([label, value]) => `<div class="kpi"><div class="label">${label}</div><div class="value">${value}</div></div>`)
        .join('');
    }

    function renderAssets(classes) {
      const root = document.getElementById('assetList');
      if (!classes.length) {
        root.innerHTML = '<div class="asset-row">Nenhuma classe encontrada no PDF.</div>';
        return;
      }

      const header = '<div class="asset-row asset-head"><div>Classe</div><div>% Carteira</div><div>Rentabilidade Mês</div><div>Sinal</div></div>';
      const body = classes
        .map(c => {
          const css = c.retorno > 0 ? 'pos' : c.retorno < 0 ? 'neg' : 'neu';
          const sinal = c.retorno > 0 ? 'Positiva' : c.retorno < 0 ? 'Negativa' : 'Neutra';
          return `<div class="asset-row"><div>${c.nome}</div><div>${fmtPct(c.alocacao)}</div><div class="${css}">${fmtPct(c.retorno, true)}</div><div class="${css}">${sinal}</div></div>`;
        })
        .join('');

      root.innerHTML = header + body;
    }

    function buildDefaultBrazilText(mesAnoLabel) {
      return `O mês de ${mesAnoLabel || 'referência'} foi marcado pela consolidação das expectativas econômicas no Brasil, com investidores atentos ao comportamento da inflação e aos próximos passos da política monetária. A dinâmica da curva de juros seguiu influenciando os ativos de renda fixa, enquanto o cenário fiscal permaneceu no radar. Nesse contexto, a diversificação da carteira foi importante para equilibrar risco e retorno.`;
    }

    function buildDefaultGlobalText(mesAnoLabel) {
      return `No cenário global, ${mesAnoLabel || 'no período'}, os mercados oscilaram entre dados de atividade e inflação nas principais economias. As decisões e sinalizações dos bancos centrais continuaram guiando o apetite a risco dos investidores. Além disso, eventos geopolíticos e o comportamento do dólar adicionaram volatilidade aos preços dos ativos.`;
    }

    function buildClassSummaryParagraph(classes) {
      if (!classes.length) return 'Não foi possível detalhar as classes de ativos a partir do PDF enviado.';

      const positives = classes.filter(c => c.retorno > 0);
      const negatives = classes.filter(c => c.retorno < 0);

      const parts = [];
      if (positives.length) {
        const posTxt = positives
          .map(c
