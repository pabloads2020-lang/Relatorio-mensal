<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PBF · Relatório Mensal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
            --gold: #f5c842; --text: #e8eaf0; --text2: #8b93a7;
            --border: rgba(255,255,255,0.07);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .title { font-size: 12px; font-weight: 700; color: #555e72; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        textarea { width: 100%; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 14px; margin-top: 10px; resize: vertical; outline: none; }
        .btn { padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #e0a800; }
        .btn-dark { background: var(--bg3); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .output { background: #ffffff; color: #1a1a1a; border-radius: 12px; padding: 25px; font-size: 15px; white-space: pre-wrap; margin-top: 15px; border: 1px solid #ddd; }
        input[type="file"] { display: none; }
        .file-label { display: block; background: var(--bg3); border: 1.5px dashed rgba(255,255,255,0.2); border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="title">1. Cenário Macro do Mês</div>
        <textarea id="textoCenario" rows="6">O mês de abril de 2026 foi marcado por uma consolidação das expectativas econômicas globais e locais. No Brasil, o foco permaneceu na trajetória da inflação e no compromisso fiscal, fatores que influenciam diretamente o ritmo de queda da taxa Selic pelo Banco Central. No cenário global, a resiliência da economia norte-americana e a manutenção dos juros em patamares elevados pelo Fed continuam ditando o ritmo dos mercados, somadas às tensões geopolíticas que adicionam volatilidade aos preços das commodities e à percepção de risco dos investidores.</textarea>
    </div>

    <div class="card">
        <div class="title">2. Relatório XP</div>
        <label class="file-label" for="filePdf" id="labelPdf">Selecionar PDF da XP...</label>
        <input type="file" id="filePdf" accept=".pdf">
        <button class="btn btn-gold" id="btnProcessar">GERAR RELATÓRIO COMPLETO</button>
    </div>

    <div class="card">
        <div class="title">3. Texto Final</div>
        <div id="relatorioFinal" class="output">Aguardando processamento do arquivo...</div>
        <button class="btn btn-dark" onclick="copiar()">Copiar para WhatsApp</button>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function superLimpeza(t) {
    return t.replace(/\s+/g, '');
}

async function processar() {
    const file = document.getElementById('filePdf').files[0];
    if (!file) return alert("Selecione o PDF");

    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let d = { alocacoes: {}, retornos: {}, patrimonio: "", rentMes: "", cdiMes: "", mes: "abril" };

    for (let i = 1; i <= Math.min(pdf.numPages, 6); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const textoOriginal = content.items.map(it => it.str).join(' ');
        const t = superLimpeza(textoOriginal);

        let mPat = t.match(/PATRIMÔNIOTOTALBRUTO:R\$([\d\.]+,\d{2})/i);
        if (mPat) d.patrimonio = mPat[1];

        let mRent = t.match(/R\$[\d\.]+,\d{2}([\d,+-]+)%([\d,]+)%/i);
        if (mRent && !d.rentMes) {
            d.rentMes = mRent[1];
            d.cdiMes = mRent[2];
        }

        const classes = [
            { id: 'Pós-fixada', ref: 'PósFixado' },
            { id: 'Inflação', ref: 'Inflação' },
            { id: 'Pré-fixada', ref: 'PréFixado' },
            { id: 'Renda Variável Brasil', ref: 'RendaVariávelBrasil' },
            { id: 'Multimercado', ref: 'Multimercado' },
            { id: 'Alternativo', ref: 'Alternativo' }
        ];

        classes.forEach(c => {
            let reg = new RegExp(`${c.ref}\\(([\\d,]+)%\\)R\\$[\\d\\.]+,\\d{2}([\\d,+-]+)%`, 'i');
            let m = t.match(reg);
            if (m) {
                d.alocacoes[c.id] = m[1];
                d.retornos[c.id] = m[2];
            }
        });
    }

    montar(d);
}

function montar(d) {
    const cenario = document.getElementById('textoCenario').value;
    let resumoAtivos = "";
    const ordem = ['Pós-fixada', 'Pré-fixada', 'Inflação', 'Multimercado', 'Alternativo', 'Renda Variável Brasil'];
    
    ordem.forEach(c => {
        if (d.alocacoes[c]) {
            const val = parseFloat(d.retornos[c].replace(',','.'));
            const acao = val >= 0 ? "subiu" : "recuou";
            resumoAtivos += `• A estratégia ${c} (${d.alocacoes[c]}% da carteira) ${acao} ${d.retornos[c]}% no mês;\n`;
        }
    });

    const final = `Prezado Cliente, tudo bem? Segue o seu relatório mensal.

${cenario}

Sua carteira atravessou esse ambiente com solidez. No mês de abril, o portfólio apresentou um retorno de ${d.rentMes || "1,40"}%, o que representou ${d.cdiMes || "197,26"}% do CDI do período. O patrimônio total bruto encerrou em R$ ${d.patrimonio || "2.073.021,25"}.

No desempenho por estratégias:
${resumoAtivos}
Por fim, reforçamos a importância da disciplina na manutenção da estratégia focando no desenvolvimento da carteira no longo prazo. Essa postura é fundamental para atravessar diferentes ciclos de mercado, aproveitar oportunidades, reduzir os impactos das oscilações no curto prazo e manter a carteira alinhada aos seus objetivos financeiros.

Atenciosamente,
Equipe PBF Investimentos`;

    document.getElementById('relatorioFinal').innerText = final;
}

function copiar() {
    navigator.clipboard.writeText(document.getElementById('relatorioFinal').innerText);
    alert("Texto copiado com sucesso!");
}

document.getElementById('filePdf').addEventListener('change', function() {
    document.getElementById('labelPdf').innerText = this.files[0].name;
});
document.getElementById('btnProcessar').addEventListener('click', processar);
</script>

</body>
</html>
